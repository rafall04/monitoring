name: mikrotik-noc

# Ports published ON THE HOST are configurable via .env (BACKEND_PORT /
# FRONTEND_PORT). Inside the containers the apps always listen on 4000 / 3000;
# only the host mapping changes. An optional Caddy reverse proxy (single port)
# is available behind the `proxy` profile: `docker compose --profile proxy up -d`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'no']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      # Container always listens on 4000; the host port is ${BACKEND_PORT} below.
      BACKEND_PORT: '4000'
      BACKEND_HOST: '0.0.0.0'
    ports:
      - '${APP_BIND:-}${BACKEND_PORT:-3500}:4000'
    # Apply migrations + seed (idempotent) then start the API.
    command: sh -c "npm run prisma:deploy && npm run seed && npm run -w @noc/backend start"
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4100/health']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - '${APP_BIND:-}${FRONTEND_PORT:-3600}:3000'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/login']
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      - backend
    restart: unless-stopped

  # Reverse proxy for domain access (proxy profile). deploy.sh generates the
  # Caddyfile (single- or split-domain) into .caddy/ and points CADDYFILE at it.
  caddy:
    image: caddy:2-alpine
    profiles: ['proxy']
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-:80}
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ${CADDYFILE:-./Caddyfile}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
